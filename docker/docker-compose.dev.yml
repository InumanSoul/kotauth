# ─── Kotauth — local development (build from source) ─────────────────────────
# Builds the image from the local Dockerfile. Used by contributors and anyone
# iterating on the source code.
#
# Run from the repo root:
#   docker compose -f docker/docker-compose.dev.yml up -d --build
#   # or via the Makefile:
#   make up
#
# For the pre-built image path (no repo clone), use docker/docker-compose.yml.
# ─────────────────────────────────────────────────────────────────────────────

name: kotauth

services:
  db:
    image: postgres:15
    container_name: kotauth-db
    environment:
      POSTGRES_DB: kotauth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kotauth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kotauth
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      # Hard-wired to the local db service — matches POSTGRES_* above.
      # KAUTH_BASE_URL and KAUTH_SECRET_KEY come from env_file (.env) — do not
      # redeclare them here, as environment: overrides env_file: for the same key.
      DB_URL: jdbc:postgresql://db:5432/kotauth_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
