name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.
        **Do not report security vulnerabilities here** — see [SECURITY.md](../SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: Kotauth version
      description: Run `docker inspect ghcr.io/inumansoul/kotauth:<tag> | grep version` or check the startup log.
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - OAuth2 / OIDC
        - Authentication (login, register, MFA)
        - Admin console
        - REST API
        - Webhooks
        - Audit logging
        - RBAC (roles, groups)
        - Social login
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a workspace with slug 'acme'
        2. Register a user
        3. Call POST /t/acme/protocol/openid-connect/token with ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant container logs or API error responses. This is automatically formatted as code.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: How are you running Kotauth?
      placeholder: |
        - Deployment: Docker Compose / Kubernetes / bare metal
        - PostgreSQL version:
        - JVM version (if running from source):
        - OS / architecture:
