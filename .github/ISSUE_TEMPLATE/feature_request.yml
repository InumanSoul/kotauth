name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the [roadmap](../docs/ROADMAP.md) to see if this is already planned.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - OAuth2 / OIDC
        - Authentication (login, register, MFA)
        - Admin console
        - REST API
        - Webhooks
        - RBAC (roles, groups)
        - Social login
        - Docker / deployment
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. A good feature request starts with a real problem.
      placeholder: "When I try to..., I can't... because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can — API shapes, config options, UI flows.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches that could solve the problem.

  - type: dropdown
    id: contribution
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes — I can open a PR"
        - "Maybe — I'd need some guidance"
        - "No — I'm requesting it for someone else to implement"
    validations:
      required: true
