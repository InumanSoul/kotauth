name: Publish

# Triggers on version tags: v1.0.0, v1.2.3-rc1, etc.
on:
  push:
    tags:
      - 'v*'

# GITHUB_TOKEN needs write access to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    env:
      # Expose the secret as an env var so it can be checked in `if:` conditions.
      # GitHub doesn't allow referencing secrets directly in `if:` expressions.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx is required for GHA layer caching.
      # arm64 dropped for now — QEMU emulation makes JVM builds 20–40 min.
      # Re-add linux/arm64 once native arm64 runners are in use.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR login — always. Uses the workflow's GITHUB_TOKEN, no secrets required.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub login — only when DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are set.
      # To enable: add both as repository secrets in Settings → Secrets → Actions.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the list of image names to push to.
      # GHCR is always included. Docker Hub is appended only when credentials exist.
      # The metadata-action reads this list to generate per-registry tags.
      - name: Build image list
        id: image-list
        run: |
          IMAGES="ghcr.io/${{ github.repository }}"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            IMAGES="${IMAGES}"$'\n'"${DOCKERHUB_USERNAME}/kotauth"
          fi
          {
            echo "images<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Derives image tags from the Git tag:
      #   v1.2.3  →  1.2.3 | 1.2 | 1 | latest
      #   v1.2.3-rc1  →  1.2.3-rc1  (pre-release: no latest tag)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-list.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=Kotauth
            org.opencontainers.image.description=Self-hosted identity and authentication platform
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      # Build once, push to all registries.
      # GHA cache keeps layer rebuilds fast across workflow runs.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Print the digest so it's visible in the workflow summary for traceability.
      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
