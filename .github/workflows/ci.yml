name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR so pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: ktlint check
        run: gradle ktlintCheck --no-daemon

  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      # setup-gradle handles the Gradle distribution cache and build scan publication.
      # gradle-version pins the distribution so CI doesn't depend on a committed wrapper JAR.
      # cache-read-only on non-main branches prevents PRs from polluting the main cache.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run tests
        run: gradle test --no-daemon --stacktrace

      # Always upload the HTML test report so failures are investigatable
      # without needing to reproduce locally.
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-report-jdk${{ matrix.java }}
          path: build/reports/tests/test/
          retention-days: 7

  # Separate job — verifies the fat JAR compiles cleanly without running
  # the full Docker build. Catches build-time errors on every PR cheaply.
  build:
    name: Build fat JAR
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-read-only: true

      - name: Build fat JAR
        run: gradle buildFatJar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotauth-jar
          path: build/libs/kotauth-all.jar
          retention-days: 1
