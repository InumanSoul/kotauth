services:
  db:
    image: postgres:15
    container_name: kotauth-db
    environment:
      POSTGRES_DB: kotauth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kotauth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: kotauth
    ports:
      - "8080:8080"
    environment:
      # Injecting environment variables into the Ktor container
      DB_URL: jdbc:postgresql://db:5432/kotauth_db
      DB_USER: postgres
      DB_PASSWORD: password
      # REQUIRED: base URL used in OIDC tokens and discovery documents
      # Change to your actual domain before deploying. Localhost is for local dev only.
      KAUTH_BASE_URL: http://localhost:8080
      # Legacy HS256 secret (no longer used for token signing — kept for config compat)
      # JWT_SECRET: change-this-in-production
    depends_on:
      db:
        condition: service_healthy
